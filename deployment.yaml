apiVersion: apps/v1
kind: Deployment
metadata:
  name: greeting-app
  labels:
    app: greeting-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: greeting-app
  template:
    metadata:
      labels:
        app: greeting-app
    spec:
      containers:
        - name: greeting-app
          image: greeting-app:latest # change to your Docker Hub image if needed
          imagePullPolicy: Never # use "Always" if using Docker Hub
          ports:
            - containerPort: 8000

          # Resource requests and limits (prevents noisy neighbor issues)
          resources:
            requests:
              cpu: "100m" # 0.1 CPU core guaranteed
              memory: "128Mi" # 128 MiB guaranteed
            limits:
              cpu: "500m" # 0.5 CPU core maximum
              memory: "256Mi" # 256 MiB maximum

          # Liveness Probe (checks if app is alive)
          livenessProbe:
            httpGet:
              path: /
              port: 8000

            initialDelaySeconds: 5
            periodSeconds: 10

          # Readiness Probe (checks if app is ready to receive traffic)
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5

--- 
Service:
  template: service_http
  selector:
    app: greeting-app
  ports:
    - port: 80
      targetPort: 8000
